"$schema" = 'https://starship.rs/config-schema.json'

format = """
[\u2588](red)\
$os\
$username\
[\ue0b4](bg:peach fg:red)\
$directory\
[\ue0b4](bg:yellow fg:peach)\
$git_branch\
$git_status\
[\ue0b4 ](fg:yellow)\
$line_break\
$character"""

right_format = """
[\ue0b6](fg:red)\
$cmd_duration\
[\ue0b6](fg:green bg:red)\
$rust\
$golang\
$nodejs\
$dotnet\
[\ue0b6](fg:lavender bg:green)\
$time\
[\u2588](lavender)"""

palette = 'default'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Macos = "\ue711"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "…/"

[git_branch]
symbol = "\ue725"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "\ued0d"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[dotnet]
symbol = "\ue77f"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "\ue65e"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "\ue7b0"
style = "bg:sapphire"

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = "[[ \uf017 $time ](fg:crust bg:lavender)]($style)"

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[\uf105](bold fg:green)"
error_symbol = "[\uf105](bold fg:red)"
vimcmd_symbol = "[\uf104](bold fg:green)"
vimcmd_replace_one_symbol = "[\uf104](bold fg:lavender)"
vimcmd_replace_symbol = "[\uf104](bold fg:lavender)"
vimcmd_visual_symbol = "[\uf104](bold fg:yellow)"

[cmd_duration]
show_milliseconds = true
format = "[[ \uf102 in $duration ](fg:crust bg:red)]($style)"
style = "bg:red"
disabled = false
show_notifications = true
min_time_to_notify = 10

[palettes.default]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"


